<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Caja SF</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --white:#fff;--black:#0d0d0d;
  --bg:#f0f2f7;
  --pink:#e8325a;--pink-lt:#fde8ed;
  --sky:#3099cc;--sky-lt:#e3f3fb;
  --g1:#eceef4;--g2:#dde0ea;--g3:#b8bccb;
  --g4:#7e8299;--g5:#3f4354;
  --red:#e8325a;--red-lt:#fde8ed;
  --amb:#b45309;--amb-lt:#fef3c7;
  --grn:#0a6b47;--grn-lt:#d1fae5;
  --fn:'Inter',sans-serif;--fd:'Inter',sans-serif;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fn);background:var(--bg);color:var(--black);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}

/* HDR */
.hdr{background:var(--white);padding:14px 16px 0;position:sticky;top:0;z-index:99;border-bottom:1px solid var(--g2)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:var(--fd);font-size:15px;font-weight:800;letter-spacing:-.3px;color:var(--black)}
.logo em{color:var(--pink);font-style:normal}
.hdr-pill{font-size:11px;font-weight:500;color:var(--g4);background:var(--g1);padding:4px 10px;border-radius:20px}
.hdr-pill.crit{background:var(--red-lt);color:var(--red);font-weight:700}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px;font-size:11px;font-weight:600;font-family:var(--fn);color:var(--g4);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;transition:all .15s}
.tab.on{color:var(--pink);border-bottom-color:var(--pink)}

/* PAGE */
.pg{padding:14px 14px 100px;display:none}
.pg.on{display:block}

/* SEARCH */
.sbar{position:relative;margin-bottom:12px}
.sbar svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--g3);pointer-events:none}
.sbar input{width:100%;background:var(--white);border:1.5px solid var(--g2);border-radius:var(--r);padding:9px 12px 9px 32px;font-family:var(--fn);font-size:13px;outline:none;color:var(--black);transition:border-color .2s}
.sbar input:focus{border-color:var(--sky)}
.sbar input::placeholder{color:var(--g3)}

/* ALERT */
.abar{background:var(--red-lt);border:1px solid #fbd0da;border-radius:var(--r);padding:10px 13px;margin-bottom:12px}
.abar-hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.abar-hd svg{width:12px;height:12px;color:var(--red)}
.abar-hd span{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px}
.abar-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-top:1px solid rgba(232,50,90,.1);font-size:12px}
.abar-row:first-child{border-top:none}
.abar-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;font-weight:500}
.abar-v{font-size:11px;font-weight:700;color:var(--red);background:rgba(232,50,90,.1);padding:2px 8px;border-radius:20px}

/* CATEGORY SECTION — colored background */
.cat{margin-bottom:8px;border-radius:var(--r);overflow:hidden}
.cat-hd{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;user-select:none;transition:filter .12s}
.cat-hd:active{filter:brightness(.96)}
.cat-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);flex-shrink:0}
.cat-lbl{font-family:var(--fd);font-size:12px;font-weight:700;flex:1;color:var(--white)}
.cat-cnt{font-size:10px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:5px}
.cat-badge{background:rgba(255,255,255,.25);color:var(--white);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px}
.cat-chev{display:flex;color:rgba(255,255,255,.7);transition:transform .2s;flex-shrink:0}
.cat-chev svg{width:12px;height:12px}
.cat-chev.open{transform:rotate(90deg)}
.cat-body{border-top:1px solid rgba(255,255,255,.15)}

/* PRODUCT ROW */
.prod{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  border-bottom:1px solid rgba(255,255,255,.12);
  cursor:pointer;transition:background .1s;
}
.prod:last-child{border-bottom:none}
.prod:active,.prod.xp{background:rgba(0,0,0,.06)}
.p-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,.95)}

/* COUNTER */
.ctr{display:flex;align-items:center;flex-shrink:0;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
.cbtn{width:30px;height:30px;border:none;background:transparent;color:rgba(255,255,255,.9);font-size:17px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--fn);transition:background .1s}
.cbtn:active{background:rgba(255,255,255,.2)}
.cval{width:38px;height:30px;text-align:center;border:none;background:transparent;font-family:var(--fd);font-size:14px;font-weight:700;color:var(--white);outline:none;padding:0}
.cval::-webkit-outer-spin-button,.cval::-webkit-inner-spin-button{-webkit-appearance:none}
.cval[type=number]{-moz-appearance:textfield}
.cval.z{color:rgba(255,255,255,.35)}

/* DETAIL PANEL */
.pdet{padding:12px 14px 13px;background:rgba(0,0,0,.12);border-bottom:1px solid rgba(255,255,255,.1);animation:din .15s ease}
.pdet:last-child{border-bottom:none}
@keyframes din{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.pdet-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.pdet-row.full{grid-template-columns:1fr}
.df label{display:block;font-size:9px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.df p{font-size:12px;color:rgba(255,255,255,.85);font-weight:500}
.df input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:7px 10px;font-family:var(--fn);font-size:12px;color:var(--white);outline:none;transition:border-color .15s}
.df input::placeholder{color:rgba(255,255,255,.3)}
.df input:focus{border-color:rgba(255,255,255,.5)}
.dsave{width:100%;padding:8px;background:rgba(255,255,255,.15);color:var(--white);border:1px solid rgba(255,255,255,.25);border-radius:7px;font-family:var(--fn);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s}
.dsave svg{width:11px;height:11px}
.dsave:active{background:rgba(255,255,255,.25)}
.dsaved{width:100%;padding:8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border:none;border-radius:7px;font-family:var(--fn);font-size:12px;font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px;animation:pop .18s ease}
.dsaved svg{width:11px;height:11px}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

/* ── CHECKLIST PAGE — notebook style ── */

/* Toggle apertura/cierre — pill style, no giant icons */
.cl-toggle{
  display:flex;background:var(--g1);border-radius:10px;
  margin-bottom:14px;padding:3px;gap:3px;
}
.cl-tog-btn{
  flex:1;padding:8px 12px;
  font-family:var(--fn);font-size:12px;font-weight:600;
  border:none;background:transparent;cursor:pointer;
  color:var(--g4);transition:all .18s;border-radius:8px;
  letter-spacing:.2px;
}
.cl-tog-btn.on{background:var(--white);color:var(--black);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* Notebook: cream paper background, ruled lines feel */
.cl-book{
  background:#fefce8;
  border:1px solid #e5e0a0;
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:10px;
  /* left binding strip */
  position:relative;
}
.cl-book::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:4px;
  background:repeating-linear-gradient(180deg,var(--pink) 0,var(--pink) 8px,transparent 8px,transparent 16px);
  opacity:.35;
}

/* Book header row */
.cl-book-hd{
  display:flex;align-items:center;
  padding:10px 12px 10px 16px;
  background:#fef9c3;
  cursor:pointer;user-select:none;gap:10px;
}
.cl-book-hd:active{filter:brightness(.97)}
.cl-book-num{
  width:22px;height:22px;border-radius:5px;
  background:#0d0d0d;color:#fef9c3;
  font-family:var(--fd);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.cl-book-title{font-family:var(--fd);font-size:13px;font-weight:700;flex:1;color:#1a1a0a}
.cl-book-prog{font-size:11px;color:#7a7040;white-space:nowrap}
.cl-book-chev{display:flex;color:#b0a860;transition:transform .2s;flex-shrink:0}
.cl-book-chev svg{width:12px;height:12px}
.cl-book-chev.open{transform:rotate(90deg)}

/* Ruled lines for items */
.cl-book-body{border-top:1px solid #e5e0a0}
.cl-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 12px 13px 16px;
  border-bottom:1px solid #e9e4aa;
  background:#fefce8;
  transition:background .12s;
  position:relative;
}
.cl-item::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:2px;
  background:transparent;
  transition:background .15s;
}
.cl-item.done::before{background:#059669}
.cl-item:last-child{border-bottom:none}
.cl-item.done{background:#f0fdf4}

/* Checkbox — notebook style */
.cl-box{
  width:20px;height:20px;border-radius:4px;
  border:1.5px solid #b0a860;
  background:var(--white);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;margin-top:2px;
  transition:all .15s;
}
.cl-box svg{width:11px;height:11px;color:var(--white);display:none}
.cl-box.on{background:#059669;border-color:#059669}
.cl-box.on svg{display:block}

.cl-item-body{flex:1;min-width:0}
.cl-item-lbl{font-size:13px;line-height:1.5;font-weight:500;color:#1a1a0a;transition:all .15s}
.cl-item.done .cl-item-lbl{color:#9ca3af;text-decoration:line-through}

/* counter inside cl */
.cl-cnt-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.cl-cnt-row label{font-size:11px;color:#7a7040;white-space:nowrap;font-weight:500}
.cl-cnt-inp{
  width:68px;background:var(--white);
  border:1px solid #c8c280;border-radius:6px;
  padding:5px 8px;font-family:var(--fd);font-size:13px;font-weight:700;
  color:var(--black);text-align:center;outline:none;
}
.cl-cnt-inp:focus{border-color:#8b7d20}

/* photo */
.cl-photos{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.cl-th-wrap{position:relative;flex-shrink:0}
.cl-th{width:76px;height:57px;object-fit:cover;border-radius:6px;border:1.5px solid #d4ce88;display:block}
.cl-dph{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:var(--red);color:white;border:none;border-radius:50%;font-size:9px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cl-addph{
  display:inline-flex;align-items:center;gap:5px;margin-top:8px;
  font-size:11px;color:#7a7040;font-weight:600;cursor:pointer;
  background:var(--white);border:1px solid #c8c280;border-radius:6px;
  padding:5px 10px;transition:background .12s;
}
.cl-addph svg{width:12px;height:12px;flex-shrink:0}
.cl-addph:active{background:#fef9c3}
input[type=file].hidden{display:none;width:0;height:0}

/* Progress + name in notebook style */
.cl-prog{background:var(--white);border:1px solid var(--g2);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.cl-prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.cl-prog-txt{font-size:12px;font-weight:600;color:var(--g5)}
.cl-prog-pct{font-size:11px;color:var(--g4)}
.cl-track{height:5px;background:var(--g1);border-radius:3px;overflow:hidden}
.cl-fill{height:100%;border-radius:3px;transition:width .3s ease;background:linear-gradient(90deg,#b45309,#d97706)}

.cl-name-wrap{background:var(--white);border:1px solid var(--g2);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.cl-name-wrap label{display:block;font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.cl-name-inp{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:8px;padding:9px 12px;font-family:var(--fn);font-size:14px;color:var(--black);outline:none;font-weight:500;transition:border-color .2s}
.cl-name-inp:focus{border-color:var(--pink)}
.cl-name-inp::placeholder{color:var(--g3)}

/* SIGNATURE */
.sig-card{background:var(--white);border:1px solid var(--g2);border-radius:var(--r);padding:14px;margin-top:10px}
.sig-card h3{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:3px}
.sig-card p{font-size:12px;color:var(--g4);margin-bottom:10px;line-height:1.5}
.sig-box{position:relative;border:1.5px dashed var(--g2);border-radius:9px;background:var(--g1);overflow:hidden;margin-bottom:9px}
.sig-box.drawn{border-color:var(--sky);background:var(--white)}
canvas#sigC{display:block;width:100%;height:100px;cursor:crosshair;touch-action:none}
.sig-row{display:flex;gap:7px}

/* FINALIZAR */
.cl-finish{
  background:linear-gradient(135deg,var(--pink),#f0507a);
  border-radius:var(--r);padding:16px 18px;margin-top:14px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;box-shadow:0 6px 24px rgba(232,50,90,.3);
  transition:opacity .15s,transform .12s;
}
.cl-finish:active{opacity:.9;transform:scale(.98)}
.cl-finish-text h3{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--white);margin-bottom:2px}
.cl-finish-text p{font-size:12px;color:rgba(255,255,255,.75)}
.cl-finish-icon{width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-finish-icon svg{width:18px;height:18px;color:var(--white)}

/* HIST */
.hent{background:var(--white);border:1px solid var(--g2);border-radius:var(--r);margin-bottom:7px;overflow:hidden}
.hent-dt{padding:8px 12px;background:var(--g1);font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between}
.hent-dt span{font-size:11px;color:var(--g5);letter-spacing:0;text-transform:none;font-weight:400}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--g1);font-size:12px}
.hrow:last-child{border-bottom:none}
.hchip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;flex-shrink:0}

/* EXPORT */
.ecard{background:var(--white);border:1px solid var(--g2);border-radius:var(--r);padding:14px;margin-bottom:9px}
.ecard h3{font-family:var(--fd);font-size:13px;font-weight:700;margin-bottom:3px}
.ecard p{font-size:11px;color:var(--g4);margin-bottom:11px;line-height:1.5}
.crit-tbl{background:var(--g1);border-radius:8px;overflow:hidden;margin-bottom:11px}
.ctrow{display:grid;grid-template-columns:1fr 42px 42px 58px;padding:6px 10px;border-bottom:1px solid var(--g2);font-size:11px;align-items:center}
.ctrow:last-child{border-bottom:none}
.ctrow.hd{font-size:9px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.4px}
.ctrow .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:5px;font-weight:500}
.chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.chip-r{background:var(--red-lt);color:var(--red)}
.chip-a{background:var(--amb-lt);color:var(--amb)}
.chip-g{background:var(--grn-lt);color:var(--grn)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border:none;border-radius:9px;font-family:var(--fn);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-bottom:7px}
.btn:last-child{margin-bottom:0}
.btn:active{opacity:.8}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-black{background:var(--black);color:var(--white)}
.btn-pink{background:var(--pink);color:var(--white)}
.btn-wa{background:#25d366;color:var(--white)}
.btn-outline{background:var(--white);color:var(--g5);border:1.5px solid var(--g2)}

/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:8px 12px 22px;z-index:99;background:linear-gradient(180deg,rgba(240,242,247,0),var(--bg) 32%)}
.bnav-in{display:flex;background:var(--white);border:1px solid var(--g2);border-radius:13px;padding:4px;box-shadow:0 2px 20px rgba(0,0,0,.08)}
.np{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 3px;border-radius:9px;cursor:pointer;border:none;background:transparent;font-family:var(--fn);transition:background .15s}
.np .ni svg{width:16px;height:16px;color:var(--g3);transition:color .15s;display:block}
.np .nl{font-size:9px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.3px}
.np.on{background:var(--pink-lt)}
.np.on .ni svg{color:var(--pink)}
.np.on .nl{color:var(--pink)}

/* ONBOARDING */
.ob-overlay{position:fixed;inset:0;background:rgba(10,10,10,.35);backdrop-filter:blur(2px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ob-sheet{width:100%;max-width:360px;background:var(--white);border-radius:16px;padding:22px 20px 24px;text-align:center}
.ob-title{font-size:15px;font-weight:700;margin-bottom:6px}
.ob-sub{font-size:13px;color:var(--g4);margin-bottom:16px;line-height:1.5}
.ob-name-inp{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:9px;padding:11px 13px;font-family:var(--fn);font-size:14px;font-weight:500;color:var(--black);outline:none;margin-bottom:12px;transition:border-color .2s;text-align:left}
.ob-name-inp:focus{border-color:var(--pink)}
.ob-name-inp::placeholder{color:var(--g3)}
.ob-btn{width:100%;padding:12px;background:var(--pink);color:var(--white);border:none;border-radius:9px;font-family:var(--fn);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.ob-btn:active{opacity:.85}

/* HEADER ICON BUTTONS */
.hdr-actions{display:flex;align-items:center;gap:6px}
.hbtn{width:30px;height:30px;background:var(--g1);border:none;border-radius:8px;color:var(--g5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.hbtn svg{width:15px;height:15px}
.hbtn:active{background:var(--g2)}
.hbtn.alert-dot{position:relative}
.hbtn.alert-dot::after{content:'';position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--white)}

/* GUIDE OVERLAY */
.guide-overlay{position:fixed;inset:0;z-index:400;pointer-events:none;display:flex;align-items:center;justify-content:center}
.guide-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);pointer-events:all}
.guide-card{position:relative;z-index:1;width:300px;background:var(--white);border-radius:14px;padding:18px 20px;box-shadow:0 6px 32px rgba(0,0,0,.2);pointer-events:all;animation:fadeIn .2s ease}
.guide-card h4{font-size:15px;font-weight:700;margin-bottom:6px}
.guide-card p{font-size:13px;color:var(--g5);line-height:1.5;margin-bottom:14px}
.guide-card-btns{display:flex;gap:8px}
.guide-card-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-family:var(--fn);font-size:12px;font-weight:600;cursor:pointer}
.guide-next{background:var(--pink);color:white}
.guide-skip{background:var(--g1);color:var(--g5)}
.guide-step-num{font-size:10px;font-weight:600;color:var(--g3);margin-bottom:6px;letter-spacing:.3px}

/* MENU DRAWER */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;animation:fadeIn .2s ease}
.menu-drawer{position:absolute;top:0;right:0;width:240px;height:100%;background:var(--white);box-shadow:-4px 0 24px rgba(0,0,0,.1);padding:52px 0 28px;display:flex;flex-direction:column}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 20px;font-size:13px;font-weight:500;color:var(--black);cursor:pointer;transition:background .12s;border:none;background:none;font-family:var(--fn);width:100%;text-align:left}
.menu-item:active{background:var(--g1)}
.menu-item svg{width:16px;height:16px;color:var(--g4);flex-shrink:0}
.menu-sep{height:1px;background:var(--g2);margin:6px 0}
.menu-user{padding:16px 20px 10px;font-size:12px;color:var(--g4);font-weight:500}
.menu-user strong{display:block;font-size:14px;color:var(--black);font-weight:700;margin-bottom:2px}

/* TIPS CARD */
.tips-card{background:linear-gradient(135deg,#fefce8,var(--white));border:1px solid #e5e0a0;border-radius:var(--r);padding:13px 14px;margin-bottom:9px}
.tips-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tips-card-hd h3{font-size:13px;font-weight:700}
.tips-card-dismiss{font-size:10px;color:var(--g4);background:none;border:1px solid var(--g2);border-radius:6px;padding:3px 9px;cursor:pointer;font-family:var(--fn)}
.tip-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-top:1px solid rgba(0,0,0,.05);font-size:12px;color:var(--g5);line-height:1.5}
.tip-item:first-of-type{border-top:none}
.tip-item svg{width:13px;height:13px;color:#b45309;flex-shrink:0;margin-top:1px}

/* STOCK FINISH BUTTON */
.stock-finish{background:var(--black);color:var(--white);border:none;border-radius:var(--r);padding:14px 18px;margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fn);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .12s}
.stock-finish svg{width:15px;height:15px}
.stock-finish:active{opacity:.85;transform:scale(.98)}

/* MISC */
.empty{text-align:center;padding:50px 20px;color:var(--g4)}
.empty svg{width:32px;height:32px;opacity:.2;margin:0 auto 10px;display:block}
.empty p{font-size:13px;line-height:1.6}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--black);color:white;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;z-index:999;white-space:nowrap;animation:ti .2s ease,to .3s ease 1.7s forwards;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(5px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{to{opacity:0}}
svg{display:block}
</style>

// ── STATE ─────────────────────────────────────────────────────
function loadS(){
  try{const s=localStorage.getItem('cajasf_v11');if(s)return JSON.parse(s);}catch(e){}
  return{counts:{},prov:{},desc:{},collapsed:{},history:[],
         clMode:'apertura',clName:'',clDone:{},clPhotos:{},clCollapsed:{},sig:null,
         onboarded:false,hideTips:false,guideSeen:{stock:false,check:false,exp:false}};
}
let S=loadS();
function persist(){localStorage.setItem('cajasf_v11',JSON.stringify(S))}

function sts(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return'none';
  const c=S.counts[id];
  if(c===undefined||c===null)return'none';
  // 0 is a valid count — product was checked and there's none left
  if(c<p.mw)return'crit';if(c<p.mw*1.5)return'low';return'ok';
}
// isCounted: any product that has been explicitly set (including 0)
function isCounted(id){return S.counts[id]!==undefined&&S.counts[id]!==null;}

function todayStr(){return new Date().toISOString().split('T')[0]}
function fmtD(d){return new Date(d+'T12:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})}

// ── EXCEL ─────────────────────────────────────────────────────
function doExcel(){
  const wb=XLSX.utils.book_new(),d=todayStr();
  const rows=[['Producto','Cat.','Stock','Mín/sem','Mín/mes','Estado','Proveedor']];
  PRODUCTS.forEach(p=>{const c=S.counts[p.id]??'',s=sts(p.id);rows.push([p.n,CATS[p.cat].l,c,p.mw,p.mm,s==='crit'?'CRÍTICO':s==='low'?'BAJO':s==='ok'?'OK':'Sin contar',S.prov[p.id]||'']);});
  const ws1=XLSX.utils.aoa_to_sheet(rows);ws1['!cols']=[{wch:34},{wch:18},{wch:10},{wch:10},{wch:10},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Stock '+d);
  const crit=PRODUCTS.filter(p=>sts(p.id)==='crit'),low=PRODUCTS.filter(p=>sts(p.id)==='low');
  if(crit.length||low.length){
    const ord=[['A ENCARGAR — '+d],[''],['Producto','Stock','Mín/sem','Diferencia','Proveedor']];
    [...crit,...low].forEach(p=>{const c=S.counts[p.id]??0;ord.push([p.n,c,p.mw,Math.max(0,p.mw-c),S.prov[p.id]||'']);});
    const ws2=XLSX.utils.aoa_to_sheet(ord);ws2['!cols']=[{wch:34},{wch:10},{wch:10},{wch:12},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws2,'A encargar');
  }
  if(S.history.length){
    const hr=[['Fecha','Producto','Cantidad','Mín/sem','Estado']];
    S.history.forEach(e=>Object.entries(e.counts).forEach(([pid,cnt])=>{const p=PRODUCTS.find(x=>x.id==pid);if(!p)return;hr.push([e.date,p.n,cnt,p.mw,cnt<p.mw?'CRÍTICO':cnt<p.mw*1.5?'BAJO':'OK']);}));
    const ws3=XLSX.utils.aoa_to_sheet(hr);ws3['!cols']=[{wch:13},{wch:34},{wch:10},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws3,'Historial');
  }
  XLSX.writeFile(wb,'stock-caja-sf-'+d+'.xlsx');toast('Excel exportado');
}

function saveDay(){
  const d=todayStr(),snap={...S.counts};
  const idx=S.history.findIndex(h=>h.date===d);
  if(idx>=0)S.history[idx].counts=snap;else S.history.unshift({date:d,counts:snap});
  if(S.history.length>90)S.history=S.history.slice(0,90);
  persist();toast('Conteo del día guardado');
}

// Build WA message for stock
function waStock(){
  const now=new Date();
  const d=now.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  const t=now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  let msg=`*STOCK CAJA SF — ${d}, ${t}*\n\n`;
  const crit=PRODUCTS.filter(p=>sts(p.id)==='crit'),low=PRODUCTS.filter(p=>sts(p.id)==='low');
  if(crit.length){msg+=`CRÍTICO (${crit.length})\n`;crit.forEach(p=>{msg+=`• ${p.n}: ${S.counts[p.id]??0} / mín ${p.mw}\n`});msg+='\n';}
  if(low.length){msg+=`BAJO (${low.length})\n`;low.forEach(p=>{msg+=`• ${p.n}: ${S.counts[p.id]??0} / mín ${p.mw}\n`});msg+='\n';}
  msg+=`Contados: ${Object.keys(S.counts).length}/${PRODUCTS.length}`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// Build WA message for checklist
function waChecklist(mode){
  const secs=mode==='apertura'?CL_APERTURA:CL_CIERRE;
  const allItems=secs.flatMap(s=>s.items);
  const done=allItems.filter(i=>S.clDone[i.id]).length;
  const now=new Date();
  const d=now.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  const t=now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  const modeLabel=mode==='apertura'?'APERTURA':'CIERRE';
  let msg=`*CHECKLIST ${modeLabel} — ${d}, ${t}*\n`;
  if(S.clName)msg+=`Responsable: ${S.clName}\n`;
  msg+=`${done}/${allItems.length} tareas completadas\n\n`;
  secs.forEach(sec=>{
    msg+=`${sec.title}\n`;
    sec.items.forEach(item=>{
      const ok=S.clDone[item.id];
      msg+=`${ok?'✓':'○'} ${item.text}\n`;
    });
    msg+='\n';
  });
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

    </div>
    <div class="sig-row">
      <button class="btn btn-outline" id="sigClr" style="flex:1;margin:0">${I.erase} Limpiar</button>
      <button class="btn btn-black" id="sigSv" style="flex:1;margin:0">${S.sig?`${I.check} Guardada`:` ${I.pen} Guardar firma`}</button>
    </div>
  </div>
  <div class="cl-finish" id="clFinish">
    <div class="cl-finish-text">
      <h3>Finalizar ${mode==='apertura'?'apertura':'cierre'}</h3>
      <p>Enviar resumen por WhatsApp</p>
    </div>
    <div class="cl-finish-icon">${I.send}</div>
  </div>`;
  return h;
}

function rClItem(item){
  const done=!!S.clDone[item.id],photos=S.clPhotos[item.id]||[];
  const cval=item.counter?(S.clCounters[item.id]??''):'';
  return`<div class="cl-item${done?' done':''}">
    <div class="cl-box${done?' on':''}" data-clck="${item.id}">${I.check}</div>
    <div class="cl-item-body">
      <div class="cl-item-lbl">${item.text}</div>
      ${item.counter?`<div class="cl-cnt-row">
        <label>Cantidad hoy:</label>
        <input class="cl-cnt-inp" type="number" value="${cval}" placeholder="0" min="0" data-clcnt="${item.id}"/>
      </div>`:''}
      ${photos.length?`<div class="cl-photos">${photos.map((ph,idx)=>`
        <div class="cl-th-wrap">
          <img class="cl-th" src="${ph}"/>
          <button class="cl-dph" data-dph="${item.id}" data-idx="${idx}">✕</button>
        </div>`).join('')}</div>`:''}
      ${item.photo?`<label class="cl-addph">${I.cam} Agregar foto<input type="file" class="hidden" accept="image/*" capture="environment" data-upl="${item.id}"/></label>`:''}
    </div>
  </div>`;
}

function rHist(){
  if(!S.history.length)return`<div class="empty"><div style="width:32px;height:32px;opacity:.2;margin:0 auto 10px">${I.clock}</div><p>Sin historial.<br>Guarda el conteo desde Exportar.</p></div>`;
  return S.history.slice(0,14).map(e=>{
    const items=Object.entries(e.counts);if(!items.length)return'';
    const nc=items.filter(([id,c])=>{const p=PRODUCTS.find(x=>x.id==id);return p&&c<p.mw}).length;
    return`<div class="hent">
      <div class="hent-dt">${fmtD(e.date)}<span>${nc>0?`${nc} crítico${nc>1?'s':''}`:'Todo OK'}</span></div>
      ${items.map(([pid,cnt])=>{const p=PRODUCTS.find(x=>x.id==pid);if(!p)return'';const s=cnt<p.mw?'crit':cnt<p.mw*1.5?'low':'ok';return`<div class="hrow"><span style="color:var(--g5)">${p.n}</span><span class="hchip" style="background:${SBG[s]};color:${SC[s]}">${cnt}</span></div>`;}).join('')}
    </div>`;
  }).join('');
}

function rExp(nCrit){
  const cnt=Object.keys(S.counts).length,nLow=PRODUCTS.filter(p=>sts(p.id)==='low').length;
  const alert=[...PRODUCTS.filter(p=>sts(p.id)==='crit'),...PRODUCTS.filter(p=>sts(p.id)==='low')].slice(0,5);
  const mode=S.clMode||'apertura';
  const allCL=(mode==='apertura'?CL_APERTURA:CL_CIERRE).flatMap(s=>s.items);
  const clDone=allCL.filter(i=>S.clDone[i.id]).length;
  const now=new Date();
  const d=now.toLocaleDateString('es-CL',{day:'numeric',month:'short'});
  const t=now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  return`
  <div class="ecard">
    <h3>Stock · ${d} ${t}</h3>
    <p>${cnt}/${PRODUCTS.length} contados${nCrit>0?` · <span style="color:var(--red);font-weight:600">${nCrit} crítico${nCrit>1?'s':''}</span>`:''}${nLow>0?` · ${nLow} bajo${nLow>1?'s':''}`:''}.</p>
    ${alert.length?`<div class="crit-tbl">
      <div class="ctrow hd"><span>Producto</span><span>Stock</span><span>Mín</span><span>Estado</span></div>
      ${alert.map(p=>{const s=sts(p.id);return`<div class="ctrow"><span class="nm">${p.n}</span><span style="font-weight:700;color:${SC[s]}">${S.counts[p.id]??0}</span><span style="color:var(--g4)">${p.mw}</span><span class="chip ${SCHI[s]||''}">${SL[s]}</span></div>`;}).join('')}
      ${nCrit+nLow>5?`<div style="text-align:center;padding:5px;font-size:11px;color:var(--g4)">+${nCrit+nLow-5} más</div>`:''}
    </div>`:''}
    <button class="btn btn-black" id="bSave">${I.save} Guardar conteo del día</button>
    <button class="btn btn-black" id="bExcel">${I.excel} Exportar Excel</button>
    <button class="btn btn-wa" id="bWA">${I.wa} Enviar por WhatsApp</button>
    <label class="btn btn-outline" style="cursor:pointer;margin-top:2px">
      ${I.import2} Importar conteo (.xlsx)
      <input type="file" accept=".xlsx" id="importFile" style="display:none"/>
    </label>
  </div>
  <div class="ecard">
    <h3>Checklist · ${mode}</h3>
    <p>${clDone}/${allCL.length} tareas completadas.</p>
    <button class="btn btn-pink" id="bPDF">${I.pdf} Exportar PDF</button>
  </div>`;
}

// Import xlsx conteo
function importXLSX(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      let loaded=0;
      rows.slice(1).forEach(row=>{
        const nombre=row[0],stock=row[2];
        if(typeof nombre!=='string'||stock===undefined||stock==='')return;
        const p=PRODUCTS.find(x=>x.n.toLowerCase()===nombre.toLowerCase());
        if(p&&!isNaN(+stock)){S.counts[p.id]=+stock;loaded++;}
      });
      persist();toast(`${loaded} productos importados`);render();
    }catch(err){toast('Error al leer el archivo');}
  };
  reader.readAsArrayBuffer(file);
}
let sigDraw=false,sigCtx=null,sigLX=0,sigLY=0;
function initSig(){
  const c=document.getElementById('sigC');if(!c)return;
  sigCtx=c.getContext('2d');
  if(S.sig){const img=new Image();img.onload=()=>sigCtx.drawImage(img,0,0,c.width,c.height);img.src=S.sig;}
  function pos(e){const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,src=e.touches?e.touches[0]:e;return[(src.clientX-r.left)*sx,(src.clientY-r.top)*sy]}
  c.addEventListener('mousedown',e=>{sigDraw=true;[sigLX,sigLY]=pos(e)});
  c.addEventListener('mousemove',e=>{if(!sigDraw)return;const[x,y]=pos(e);sigCtx.beginPath();sigCtx.moveTo(sigLX,sigLY);sigCtx.lineTo(x,y);sigCtx.strokeStyle='#0d0d0d';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.stroke();[sigLX,sigLY]=[x,y];c.closest('.sig-box').classList.add('drawn')});
  c.addEventListener('mouseup',()=>sigDraw=false);
  c.addEventListener('touchstart',e=>{e.preventDefault();sigDraw=true;[sigLX,sigLY]=pos(e)},{passive:false});
  c.addEventListener('touchmove',e=>{if(!sigDraw)return;e.preventDefault();const[x,y]=pos(e);sigCtx.beginPath();sigCtx.moveTo(sigLX,sigLY);sigCtx.lineTo(x,y);sigCtx.strokeStyle='#0d0d0d';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.stroke();[sigLX,sigLY]=[x,y];c.closest('.sig-box').classList.add('drawn')},{passive:false});
  c.addEventListener('touchend',()=>sigDraw=false);
}

// ── BIND ──────────────────────────────────────────────────────
function updC(id,val){
  S.counts[id]=Math.max(0,val);persist();
  document.querySelectorAll(`[data-c="${id}"]`).forEach(el=>{el.value=S.counts[id];el.className=`cval${S.counts[id]===0?' z':''}`;});
}
function bind(){
  // onboarding
  const obNext=document.getElementById('obNext');
  if(obNext)obNext.addEventListener('click',()=>{
    const n=document.getElementById('obName');
    if(n){S.clName=n.value.trim();persist();}
    if(!S.clName)return;
    S.onboarded=true;persist();
    S.guideSeen.stock=true;persist();guideStep=0;render();
  });
  const obName=document.getElementById('obName');
  if(obName){
    obName.addEventListener('input',e=>{
      S.clName=e.target.value;persist();
      const btn=document.getElementById('obNext');
      if(btn){btn.disabled=!e.target.value.trim();btn.style.opacity=e.target.value.trim()?'1':'.4';}
    });
    obName.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&S.clName.trim()){
        S.onboarded=true;persist();
        S.guideSeen.stock=true;persist();guideStep=0;render();
      }
    });
  }

  // guide
  const gNext=document.getElementById('guideNext');
  if(gNext)gNext.addEventListener('click',()=>guideNext());
  const gSkip=document.getElementById('guideSkip');
  if(gSkip)gSkip.addEventListener('click',()=>{guideStep=-1;render()});
  const gBack=document.getElementById('guideBack');
  if(gBack)gBack.addEventListener('click',()=>{guideStep=-1;render()});

  // header buttons
  const hBulb=document.getElementById('hBulb');
  if(hBulb)hBulb.addEventListener('click',()=>{S.guideSeen={stock:false,check:false,exp:false};persist();guideStep=0;render()});
  const hMenu=document.getElementById('hMenu');
  if(hMenu)hMenu.addEventListener('click',()=>{showMenu=true;render()});

  // menu drawer
  const menuOverlay=document.getElementById('menuOverlay');
  if(menuOverlay)menuOverlay.addEventListener('click',e=>{if(e.target===menuOverlay){showMenu=false;showMenuNameEdit=false;render()}});
  const menuClose=document.getElementById('menuClose');
  if(menuClose)menuClose.addEventListener('click',()=>{showMenu=false;showMenuNameEdit=false;render()});
  const menuGuide=document.getElementById('menuGuide');
  if(menuGuide)menuGuide.addEventListener('click',()=>{S.guideSeen={stock:false,check:false,exp:false};persist();showMenu=false;showMenuNameEdit=false;guideStep=0;render()});
  const menuUser=document.getElementById('menuUser');
  if(menuUser)menuUser.addEventListener('click',()=>{showMenuNameEdit=!showMenuNameEdit;render();const inp=document.getElementById('menuNameInp');if(inp)inp.focus()});
  const menuNameSave=document.getElementById('menuNameSave');
  if(menuNameSave)menuNameSave.addEventListener('click',()=>{const inp=document.getElementById('menuNameInp');if(inp&&inp.value.trim()){S.clName=inp.value.trim();persist();showMenuNameEdit=false;render();toast('Nombre actualizado')}});
  const menuNameInp=document.getElementById('menuNameInp');
  if(menuNameInp)menuNameInp.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v){S.clName=v;persist();showMenuNameEdit=false;render();toast('Nombre actualizado')}}});
  const menuReset=document.getElementById('menuReset');
  if(menuReset)menuReset.addEventListener('click',()=>{if(confirm('¿Reiniciar todo el conteo?')){S.counts={};persist();showMenu=false;showMenuNameEdit=false;toast('Conteo reiniciado');render()}});

  // tabs
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{tab=el.dataset.tab;search='';render();maybeStartGuide()}));

  // search
  const si=document.getElementById('si');
  if(si){si.addEventListener('input',e=>{search=e.target.value;render();const n=document.getElementById('si');if(n){n.focus();const l=n.value.length;n.setSelectionRange(l,l)}});si.addEventListener('click',e=>e.stopPropagation())}

  // stock
  document.querySelectorAll('[data-col]').forEach(el=>el.addEventListener('click',()=>{S.collapsed[el.dataset.col]=!S.collapsed[el.dataset.col];render()}));
  document.querySelectorAll('[data-exp]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('[data-c],[data-dec],[data-inc],[data-f],[data-sv],[data-edit],[data-canceledit]'))return;const id=+el.dataset.exp;if(expanded!==id)editProd=null;expanded=expanded===id?null:id;render()}));
  document.querySelectorAll('[data-dec]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();updC(+b.dataset.dec,(S.counts[+b.dataset.dec]??0)-1)}));
  document.querySelectorAll('[data-inc]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();updC(+b.dataset.inc,(S.counts[+b.dataset.inc]??0)+1)}));
  document.querySelectorAll('[data-c]').forEach(inp=>{inp.addEventListener('change',e=>updC(+inp.dataset.c,parseInt(e.target.value)||0));inp.addEventListener('focus',e=>e.target.select());inp.addEventListener('click',e=>e.stopPropagation())});
  document.querySelectorAll('[data-f]').forEach(inp=>{inp.addEventListener('change',e=>{const pid=+inp.dataset.pid;if(inp.dataset.f==='prov')S.prov[pid]=e.target.value;else S.desc[pid]=e.target.value;persist()});inp.addEventListener('click',e=>e.stopPropagation())});
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();editProd=+b.dataset.edit;render()}));
  document.querySelectorAll('[data-canceledit]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();editProd=null;render()}));
  document.querySelectorAll('[data-sv]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const pid=+b.dataset.sv;sf[pid]=true;persist();render();setTimeout(()=>{delete sf[pid];render()},1400)}));

  // finish stock button → show modal
  const stFin=document.getElementById('stockFinish');
  if(stFin)stFin.addEventListener('click',()=>{showFinish=true;render()});
  // finish modal
  const finOverlay=document.getElementById('finOverlay');
  if(finOverlay)finOverlay.addEventListener('click',e=>{if(e.target===finOverlay){showFinish=false;render()}});
  const finClose=document.getElementById('finClose');
  if(finClose)finClose.addEventListener('click',()=>{showFinish=false;render()});
  const finWA=document.getElementById('finWA');
  if(finWA)finWA.addEventListener('click',()=>{showFinish=false;waStock()});
  const finSave=document.getElementById('finSave');
  if(finSave)finSave.addEventListener('click',()=>{showFinish=false;saveDay()});

  // checklist
  document.querySelectorAll('[data-mode]').forEach(el=>el.addEventListener('click',()=>{S.clMode=el.dataset.mode;persist();render()}));
  const cln=document.getElementById('clName');if(cln){cln.addEventListener('input',e=>{S.clName=e.target.value;persist()});}
  document.querySelectorAll('[data-cls]').forEach(el=>el.addEventListener('click',()=>{S.clCollapsed[el.dataset.cls]=!S.clCollapsed[el.dataset.cls];render()}));
  document.querySelectorAll('[data-clck]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.clDone[el.dataset.clck]=!S.clDone[el.dataset.clck];persist();render()}));
  const clr=document.getElementById('clReset');if(clr)clr.addEventListener('click',()=>{S.clDone={};S.clPhotos={};S.sig=null;persist();render()});

  // photos
  document.querySelectorAll('[data-upl]').forEach(inp=>inp.addEventListener('change',e=>{const id=inp.dataset.upl,file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{if(!S.clPhotos[id])S.clPhotos[id]=[];S.clPhotos[id].push(ev.target.result);persist();render()};r.readAsDataURL(file)}));
  document.querySelectorAll('[data-dph]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const id=btn.dataset.dph,idx=+btn.dataset.idx;if(S.clPhotos[id]){S.clPhotos[id].splice(idx,1);if(!S.clPhotos[id].length)delete S.clPhotos[id]}persist();render()}));

  // signature
  initSig();
  const sc=document.getElementById('sigClr');if(sc)sc.addEventListener('click',()=>{const c=document.getElementById('sigC');if(c&&sigCtx){sigCtx.clearRect(0,0,c.width,c.height);c.closest('.sig-box').classList.remove('drawn');S.sig=null;persist();render()}});
  const ss=document.getElementById('sigSv');if(ss)ss.addEventListener('click',()=>{const c=document.getElementById('sigC');if(c){S.sig=c.toDataURL();persist();toast('Firma guardada');render()}});
  const fin=document.getElementById('clFinish');if(fin)fin.addEventListener('click',()=>{waChecklist(S.clMode||'apertura')});

  // tips dismiss
  const td=document.getElementById('tipsDismiss');if(td)td.addEventListener('click',()=>{S.hideTips=true;persist();render()});

  // import
  const imp=document.getElementById('importFile');
  if(imp)imp.addEventListener('change',e=>{const f=e.target.files[0];if(f)importXLSX(f)});

  // export
  const bSave=document.getElementById('bSave');if(bSave)bSave.addEventListener('click',saveDay);
  const bExcel=document.getElementById('bExcel');if(bExcel)bExcel.addEventListener('click',doExcel);
  const bWA=document.getElementById('bWA');if(bWA)bWA.addEventListener('click',waStock);
  const bPDF=document.getElementById('bPDF');if(bPDF)bPDF.addEventListener('click',()=>doPDF(S.clMode||'apertura'));
}

// ── AUTO-GUIDE ────────────────────────────────────────────────
// Each tab shows its tips once, one at a time
// Stock: steps 0-2 (after 4s delay), Check: 3-4 (immediately), Exp: 5 (immediately)
const GUIDE_TAB = {stock:[0,1,2], check:[3,4], exp:[5]};
let stockDelayTimer = null;

// Ensure guideSeen exists on old state
if(!S.guideSeen)S.guideSeen={stock:false,check:false,exp:false};

function maybeStartGuide(){
  if(!S.onboarded||guideStep>=0)return;
  if(tab==='stock'&&!S.guideSeen.stock){
    if(stockDelayTimer)clearTimeout(stockDelayTimer);
    stockDelayTimer=setTimeout(()=>{
      if(!S.guideSeen.stock&&guideStep<0&&tab==='stock'){
        S.guideSeen.stock=true;persist();guideStep=0;render();
      }
    },4000);
  }
  if(tab==='check'&&!S.guideSeen.check){
    S.guideSeen.check=true;persist();
    setTimeout(()=>{if(guideStep<0){guideStep=3;render();}},500);
  }
  if(tab==='exp'&&!S.guideSeen.exp){
    S.guideSeen.exp=true;persist();
    setTimeout(()=>{if(guideStep<0){guideStep=5;render();}},300);
  }
}

// When guide advances, stop at end of current tab's steps
function guideNext(){
  const key=tab==='stock'?'stock':tab==='check'?'check':'exp';
  const steps=GUIDE_TAB[key]||[];
  const nextStep=guideStep+1;
  if(steps.includes(nextStep)){guideStep=nextStep;render();}
  else{guideStep=-1;render();}
}

render();
setTimeout(()=>{if(S.onboarded)maybeStartGuide();},400);
</script>
