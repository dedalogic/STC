<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Caja SF</title>
<link rel="icon" type="image/png" href="icon.png"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#F2F2F7;
  --surface:#FFFFFF;
  --surface2:rgba(255,255,255,.72);
  --black:#1C1C1E;
  --label2:#636366;
  --label3:#AEAEB2;
  --sep:rgba(60,60,67,.12);
  --pink:#E8325A;
  --pink-lt:#FDEDF1;
  --am-ap:#1A73E8;
  --am-ci:#7B2FBE;
  --pm-ci:#00897B;
  --red:#FF3B30;--red-lt:#FFF1F0;
  --amb:#FF9500;--amb-lt:#FFF8EC;
  --grn:#34C759;--grn-lt:#EDFFF2;
  --fn:'DM Sans',system-ui,sans-serif;--fd:'DM Sans',system-ui,sans-serif;
  --r:14px;--r-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 8px 32px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fn);background:var(--bg);color:var(--black);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* HDR */
.hdr{background:rgba(242,242,247,.85);padding:12px 18px 0;position:sticky;top:0;z-index:99;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--sep)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:17px;font-weight:700;letter-spacing:-.4px;color:var(--black)}
.logo em{color:var(--pink);font-style:normal}
.tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;font-size:12px;font-weight:500;font-family:var(--fn);color:var(--label2);border:none;background:none;border-bottom:2.5px solid transparent;cursor:pointer;letter-spacing:-.1px;transition:color .15s,border-color .15s}
.tab.on{color:var(--pink);border-bottom-color:var(--pink);font-weight:600}

/* PAGE */
.pg{padding:16px 16px 110px;display:none}
.pg.on{display:block}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideBack{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.cl-screen-enter{animation:slideIn .2s ease forwards}
.cl-screen-back{animation:slideBack .2s ease forwards}

/* SEARCH */
.sbar{position:relative;margin-bottom:14px}
.sbar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--label3);pointer-events:none}
.sbar input{width:100%;background:var(--surface);border:none;border-radius:var(--r);padding:11px 14px 11px 36px;font-family:var(--fn);font-size:15px;outline:none;color:var(--black);box-shadow:var(--shadow)}
.sbar input::placeholder{color:var(--label3)}

/* CATEGORY SECTION */
.cat{margin-bottom:10px;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.cat-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none}
.cat-hd:active{filter:brightness(.94)}
.cat-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);flex-shrink:0}
.cat-lbl{font-size:13px;font-weight:600;flex:1;color:rgba(255,255,255,.95);letter-spacing:-.1px}
.cat-chev{display:flex;color:rgba(255,255,255,.55);transition:transform .2s;flex-shrink:0}
.cat-chev svg{width:13px;height:13px}
.cat-chev.open{transform:rotate(90deg)}
.cat-body{border-top:1px solid rgba(255,255,255,.12)}

/* PRODUCT ROW */
.prod{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer;transition:background .1s}
.prod:last-child{border-bottom:none}
.prod:active,.prod.xp{background:rgba(0,0,0,.07)}
.p-name{flex:1;font-size:14px;font-weight:400;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,.92)}

/* COUNTER */
.ctr{display:flex;align-items:center;flex-shrink:0;background:rgba(255,255,255,.18);border-radius:9px;overflow:hidden}
.cbtn{width:32px;height:32px;border:none;background:transparent;color:rgba(255,255,255,.85);font-size:18px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--fn);transition:background .1s}
.cbtn:active{background:rgba(255,255,255,.25)}
.cval{width:40px;height:32px;text-align:center;border:none;background:transparent;font-family:var(--fd);font-size:14px;font-weight:600;color:var(--surface);outline:none;padding:0}
.cval::-webkit-outer-spin-button,.cval::-webkit-inner-spin-button{-webkit-appearance:none}
.cval[type=number]{-moz-appearance:textfield}
.cval.z{color:rgba(255,255,255,.3)}

/* DETAIL PANEL */
.pdet{padding:14px 16px;background:rgba(0,0,0,.14);animation:din .15s ease}
@keyframes din{from{opacity:0}to{opacity:1}}
.pdet-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pdet-row.full{grid-template-columns:1fr}
.df label{display:block;font-size:10px;font-weight:600;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.df p{font-size:13px;color:rgba(255,255,255,.85);font-weight:500}
.df input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:8px 11px;font-family:var(--fn);font-size:13px;color:var(--surface);outline:none;transition:border-color .15s}
.df input::placeholder{color:rgba(255,255,255,.3)}
.df input:focus{border-color:rgba(255,255,255,.4)}
.dsave{margin-top:4px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.85);border:none;border-radius:8px;padding:7px 14px;font-family:var(--fn);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.dsave svg{width:12px;height:12px}
.dsaved{font-size:12px;color:rgba(255,255,255,.6);padding:7px 0;display:flex;align-items:center;gap:5px}

/* CHECKLIST */
.cl-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid var(--sep);background:var(--surface);transition:background .1s}
.cl-item:last-child{border-bottom:none}
.cl-item.done{background:#FAFFFE}
.cl-item:active{background:var(--bg)}
.cl-box{width:22px;height:22px;border-radius:50%;border:2px solid var(--label3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .15s}
.cl-box.on{background:var(--grn);border-color:var(--grn)}
.cl-box svg{width:12px;height:12px;color:white}
.cl-item-body{flex:1}
.cl-item-lbl{font-size:14px;color:var(--black);line-height:1.5;font-weight:400}
.cl-item.done .cl-item-lbl{color:var(--label3)}

/* PHOTO */
.cl-photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.cl-th-wrap{position:relative;flex-shrink:0}
.cl-th{width:72px;height:56px;object-fit:cover;border-radius:10px;display:block}
.cl-dph{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(--red);color:white;border:none;border-radius:50%;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cl-addph{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--am-ap);font-weight:600;cursor:pointer;padding:6px 12px;background:rgba(26,115,232,.08);border-radius:20px}
.cl-addph svg{width:13px;height:13px}
input[type=file].hidden{display:none;width:0;height:0}

/* PROG */
.cl-prog{margin-bottom:14px}
.cl-prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.cl-prog-txt{font-size:13px;font-weight:500;color:var(--label2)}
.cl-prog-pct{font-size:13px;font-weight:600;color:var(--black)}
.cl-track{height:4px;background:var(--sep);border-radius:2px;overflow:hidden}
.cl-fill{height:100%;border-radius:2px;transition:width .3s ease}

/* NAME WRAP */
.cl-name-wrap{background:var(--surface);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.cl-name-wrap label{display:block;font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.1px;margin-bottom:5px}
.cl-name-inp{width:100%;background:var(--bg);border:none;border-radius:var(--r-sm);padding:9px 12px;font-family:var(--fn);font-size:15px;color:var(--black);outline:none;font-weight:400}
.cl-name-inp::placeholder{color:var(--label3)}

/* SIG */
.sig-card{background:var(--surface);border-radius:var(--r);padding:14px;margin-top:10px;box-shadow:var(--shadow)}
.sig-box{position:relative;border:1.5px dashed var(--sep);border-radius:var(--r-sm);background:var(--bg);overflow:hidden;margin-bottom:8px}
.sig-box.drawn{border-color:var(--am-ap);background:var(--surface)}
canvas#sigC{display:block;width:100%;height:96px;cursor:crosshair;touch-action:none}
.sig-row{display:flex;gap:8px}

/* FINISH BUTTON */
.cl-finish{border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:opacity .15s,transform .12s}
.cl-finish:active{opacity:.88;transform:scale(.98)}
.cl-finish-text h3{font-size:15px;font-weight:700;color:white;margin-bottom:2px;letter-spacing:-.2px}
.cl-finish-text p{font-size:12px;color:rgba(255,255,255,.65)}
.cl-finish-icon{width:38px;height:38px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-finish-icon svg{width:17px;height:17px;color:white}

/* HIST */
.hent{background:var(--surface);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.hent-dt{padding:10px 14px;font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.1px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sep)}
.hent-dt span{font-size:12px;color:var(--label2);font-weight:400}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--sep);font-size:13px}
.hrow:last-child{border-bottom:none}
.hchip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;flex-shrink:0}

/* EXPORT */
.ecard{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.ecard h3{font-size:15px;font-weight:700;margin-bottom:3px;letter-spacing:-.2px}
.ecard p{font-size:13px;color:var(--label2);margin-bottom:13px;line-height:1.5}
.crit-tbl{background:var(--bg);border-radius:var(--r-sm);overflow:hidden;margin-bottom:12px}
.ctrow{display:grid;grid-template-columns:1fr 42px 42px 58px;padding:8px 12px;border-bottom:1px solid var(--sep);font-size:12px;align-items:center}
.ctrow:last-child{border-bottom:none}
.ctrow.hd{font-size:10px;font-weight:600;color:var(--label3);letter-spacing:.3px}
.ctrow .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:5px;font-weight:500}
.chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.chip-r{background:var(--red-lt);color:var(--red)}
.chip-a{background:var(--amb-lt);color:var(--amb)}
.chip-g{background:var(--grn-lt);color:var(--grn)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border:none;border-radius:var(--r);font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-bottom:8px}
.btn:last-child{margin-bottom:0}
.btn:active{opacity:.8}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-black{background:var(--black);color:white}
.btn-pink{background:var(--pink);color:white}
.btn-wa{background:#25D366;color:white}
.btn-outline{background:var(--bg);color:var(--label2);font-weight:500}

/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:8px 12px 28px;z-index:99;background:linear-gradient(180deg,rgba(242,242,247,0) 0%,var(--bg) 40%)}
.bnav-in{display:flex;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:18px;padding:5px;box-shadow:0 4px 24px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.06)}
.np{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:13px;cursor:pointer;border:none;background:transparent;font-family:var(--fn);transition:background .15s}
.np .ni svg{width:18px;height:18px;color:var(--label3);transition:color .15s;display:block}
.np .nl{font-size:10px;font-weight:500;color:var(--label3);letter-spacing:.1px}
.np.on{background:var(--pink-lt)}
.np.on .ni svg{color:var(--pink)}
.np.on .nl{color:var(--pink)}

/* ONBOARDING */
.ob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ob-sheet{width:100%;max-width:340px;background:var(--surface);border-radius:22px;padding:24px 22px 26px;text-align:center;box-shadow:var(--shadow-md)}
.ob-title{font-size:17px;font-weight:700;margin-bottom:5px;letter-spacing:-.3px}
.ob-sub{font-size:14px;color:var(--label2);margin-bottom:18px;line-height:1.5}
.ob-name-inp{width:100%;background:var(--bg);border:none;border-radius:var(--r-sm);padding:12px 14px;font-family:var(--fn);font-size:16px;color:var(--black);outline:none;margin-bottom:13px;text-align:left}
.ob-name-inp::placeholder{color:var(--label3)}
.ob-btn{width:100%;padding:13px;background:var(--pink);color:white;border:none;border-radius:var(--r);font-family:var(--fn);font-size:15px;font-weight:600;cursor:pointer}
.ob-btn:active{opacity:.85}

/* HDR ACTIONS */
.hdr-actions{display:flex;align-items:center;gap:6px}
.hbtn{width:32px;height:32px;background:var(--bg);border:none;border-radius:10px;color:var(--label2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn svg{width:16px;height:16px}
.hbtn.alert-dot{position:relative}
.hbtn.alert-dot::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg)}

/* GUIDE */
.guide-overlay{position:fixed;inset:0;z-index:400;pointer-events:none;display:flex;align-items:center;justify-content:center}
.guide-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);pointer-events:all}
.guide-card{position:relative;z-index:1;width:290px;background:var(--surface);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow-md);pointer-events:all;animation:fadeIn .2s ease}
.guide-card h4{font-size:15px;font-weight:700;margin-bottom:5px;letter-spacing:-.2px}
.guide-card p{font-size:13px;color:var(--label2);line-height:1.5;margin-bottom:14px}
.guide-card-btns{display:flex;gap:7px}
.guide-card-btns button{flex:1;padding:10px;border:none;border-radius:var(--r-sm);font-family:var(--fn);font-size:13px;font-weight:600;cursor:pointer}
.guide-next{background:var(--pink);color:white}
.guide-skip{background:var(--bg);color:var(--label2)}
.guide-step-num{font-size:11px;font-weight:500;color:var(--label3);margin-bottom:7px}

/* MENU */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:300;animation:fadeIn .2s ease}
.menu-drawer{position:absolute;top:0;right:0;width:240px;height:100%;background:rgba(242,242,247,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:52px 0 28px;display:flex;flex-direction:column}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 20px;font-size:14px;font-weight:400;color:var(--black);cursor:pointer;border:none;background:none;font-family:var(--fn);width:100%;text-align:left}
.menu-item:active{background:rgba(0,0,0,.05)}
.menu-item svg{width:17px;height:17px;color:var(--label2);flex-shrink:0}
.menu-sep{height:1px;background:var(--sep);margin:5px 0}
.menu-user{padding:16px 20px 10px;font-size:12px;color:var(--label2)}
.menu-user strong{display:block;font-size:15px;color:var(--black);font-weight:600;margin-bottom:1px}

/* TIPS */
.tips-card{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.tips-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tips-card-hd h3{font-size:14px;font-weight:600;letter-spacing:-.1px}
.tips-card-dismiss{font-size:12px;color:var(--am-ap);background:none;border:none;cursor:pointer;font-family:var(--fn);font-weight:500}
.tip-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-top:1px solid var(--sep);font-size:13px;color:var(--label2);line-height:1.5}
.tip-item:first-of-type{border-top:none}
.tip-item svg{width:13px;height:13px;color:var(--am-ap);flex-shrink:0;margin-top:2px}

/* STOCK FINISH */
.stock-finish{background:var(--black);color:white;border:none;border-radius:var(--r);padding:15px 18px;margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .12s}
.stock-finish:active{opacity:.85;transform:scale(.98)}
.stock-finish svg{width:15px;height:15px}

/* MISC */
.empty{text-align:center;padding:56px 20px;color:var(--label3)}
.empty svg{width:36px;height:36px;opacity:.25;margin:0 auto 12px;display:block}
.empty p{font-size:14px;line-height:1.6;color:var(--label2)}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.88);backdrop-filter:blur(12px);color:white;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;animation:ti .2s ease,to .3s ease 1.7s forwards;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{to{opacity:0}}
svg{display:block}
@media print{#pdfPrint>div:first-child{display:none!important}}
</style>
</head>

<div id="root"></div>
<script>

const I={
  search:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  chev:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,

function persist(){localStorage.setItem('cajasf_v11',JSON.stringify(S))}

function sts(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return'none';
  const c=S.counts[id];
  if(c===undefined||c===null)return'none';
  // 0 is a valid count — product was checked and there's none left
  if(c<p.mw)return'crit';if(c<p.mw*1.5)return'low';return'ok';
}
// isCounted: any product that has been explicitly set (including 0)
function isCounted(id){return S.counts[id]!==undefined&&S.counts[id]!==null;}

async function doExcel(){
  const wb=XLSX.utils.book_new(),d=todayStr();
  const rows=[['Producto','Cat.','Stock','Mín/sem','Mín/mes','Estado','Proveedor']];
  PRODUCTS.forEach(p=>{const c=S.counts[p.id]??'',s=sts(p.id);rows.push([p.n,CATS[p.cat].l,c,p.mw,p.mm,s==='crit'?'CRÍTICO':s==='low'?'BAJO':s==='ok'?'OK':'Sin contar',S.prov[p.id]||'']);});
  const ws1=XLSX.utils.aoa_to_sheet(rows);ws1['!cols']=[{wch:34},{wch:18},{wch:10},{wch:10},{wch:10},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Stock '+d);
  const crit=PRODUCTS.filter(p=>sts(p.id)==='crit'),low=PRODUCTS.filter(p=>sts(p.id)==='low');
  if(crit.length||low.length){
    const ord=[['A ENCARGAR — '+d],[''],['Producto','Stock','Mín/sem','Diferencia','Proveedor']];
    [...crit,...low].forEach(p=>{const c=S.counts[p.id]??0;ord.push([p.n,c,p.mw,Math.max(0,p.mw-c),S.prov[p.id]||'']);});
    const ws2=XLSX.utils.aoa_to_sheet(ord);ws2['!cols']=[{wch:34},{wch:10},{wch:10},{wch:12},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws2,'A encargar');
  }
  if(S.history.length){
    const hr=[['Fecha','Producto','Cantidad','Mín/sem','Estado']];
    S.history.forEach(e=>Object.entries(e.counts).forEach(([pid,cnt])=>{const p=PRODUCTS.find(x=>x.id==pid);if(!p)return;hr.push([e.date,p.n,cnt,p.mw,cnt<p.mw?'CRÍTICO':cnt<p.mw*1.5?'BAJO':'OK']);}));
    const ws3=XLSX.utils.aoa_to_sheet(hr);ws3['!cols']=[{wch:13},{wch:34},{wch:10},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws3,'Historial');
  }
  const fname='stock-caja-sf-'+d+'.xlsx';
  // On mobile: try share as file
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(isMobile&&navigator.canShare){
    try{
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const file=new File([blob],fname,{type:blob.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Stock Caja SF'});
        return;
      }
    }catch(e){if(e.name==='AbortError')return;}
  }
  // Desktop / fallback: normal download
  XLSX.writeFile(wb,fname);
  toast('Excel exportado');
}

function saveDay(){
  const d=todayStr(),snap={...S.counts};
  const idx=S.history.findIndex(h=>h.date===d);
  if(idx>=0)S.history[idx].counts=snap;else S.history.unshift({date:d,counts:snap});
  if(S.history.length>90)S.history=S.history.slice(0,90);
  persist();toast('Conteo del día guardado');
}

function openWA(msg){
  const encoded=encodeURIComponent(msg);
  // On mobile use native whatsapp:// scheme; on desktop use web
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(isMobile){
    window.location.href='whatsapp://send?text='+encoded;
  } else {
    window.open('https://web.whatsapp.com/send?text='+encoded,'_blank');
  }
}

// Build WA message for stock
function waStock(){
  const now=new Date();
  const d=now.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  const t=now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  let msg=`*STOCK CAJA SF — ${d}, ${t}*\n\n`;
  const crit=PRODUCTS.filter(p=>sts(p.id)==='crit');
  const low=PRODUCTS.filter(p=>sts(p.id)==='low');
  const ok=PRODUCTS.filter(p=>sts(p.id)==='ok');
  if(crit.length){msg+=`🔴 CRÍTICO (${crit.length})\n`;crit.forEach(p=>{msg+=`• ${p.n}: ${S.counts[p.id]??0} / mín ${p.mw}\n`});msg+='\n';}
  if(low.length){msg+=`🟡 BAJO (${low.length})\n`;low.forEach(p=>{msg+=`• ${p.n}: ${S.counts[p.id]??0} / mín ${p.mw}\n`});msg+='\n';}
  if(ok.length){msg+=`🟢 OK (${ok.length})\n`;ok.forEach(p=>{msg+=`• ${p.n}: ${S.counts[p.id]??0}\n`});msg+='\n';}
  const uncounted=PRODUCTS.filter(p=>!isCounted(p.id));
  if(uncounted.length)msg+=`Sin contar: ${uncounted.length} productos\n`;
  openWA(msg);
}

// Build WA message for checklist
function waChecklist(mode){
  const secs=mode==='apertura'?CL_APERTURA:CL_CIERRE;
  const allItems=secs.flatMap(s=>s.items);
  const done=allItems.filter(i=>S.clDone[i.id]).length;
  const now=new Date();
  const d=now.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  const t=now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  const modeLabel=mode==='apertura'?'APERTURA':'CIERRE';
  let msg=`*CHECKLIST ${modeLabel} — ${d}, ${t}*\n`;
  if(S.clName)msg+=`Responsable: ${S.clName}\n`;
  msg+=`${done}/${allItems.length} tareas completadas\n\n`;
  secs.forEach(sec=>{
    msg+=`${sec.title}\n`;
    sec.items.forEach(item=>{
      const ok=S.clDone[item.id];
      msg+=`${ok?'✓':'○'} ${item.text}\n`;
    });
    msg+='\n';
  });
  openWA(msg);
}

  const now = new Date();
  // Date: 10/04 · 14:32
  const day = String(now.getDate()).padStart(2,'0');
  const mon = String(now.getMonth()+1).padStart(2,'0');
  const t = now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  const dateStr = day+'/'+mon+' · '+t;
  const modeLabel = mode==='apertura'?'APERTURA':'CIERRE';
  const pageW=210, pageH=297, margin=14, colW=pageW-margin*2;
  let y=0;

  function checkPage(needed){
    if(y+needed>pageH-16){doc.addPage();y=14;}
  }

  // ── HEADER BAR ──
  const hdrColor = mode==='apertura'?[29,111,168]:mode==='cierre'&&S.clScreen==='pmCi'?[15,118,110]:[107,33,168];
  doc.setFillColor(...hdrColor);
  doc.rect(0,0,pageW,20,'F');
  // Title left
  doc.setTextColor(255,255,255);doc.setFontSize(12);doc.setFont('helvetica','bold');
  doc.text('Street Flags — Checklist '+modeLabel, margin, 13);
  // Date right
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(dateStr, pageW-margin, 13, {align:'right'});
  y = 26;

  // ── NAME + PROGRESS BAR (same line area) ──
  if(S.clName){
    doc.setTextColor(17,17,17);doc.setFontSize(13);doc.setFont('helvetica','bold');
    doc.text(S.clName, margin, y);
  }
  const pct = allItems.length?Math.round(done/allItems.length*100):0;
  // Progress label right
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text(done+'/'+allItems.length+' · '+pct+'%', pageW-margin, y, {align:'right'});
  y += 3;
  // Bar full width
  doc.setFillColor(230,230,230);doc.roundedRect(margin, y, colW, 3, 1, 1,'F');
  if(pct>0){doc.setFillColor(...hdrColor);doc.roundedRect(margin, y, Math.max(2,colW*pct/100), 3, 1, 1,'F');}
  y += 8;

  // ── SECTIONS ──
  for(let si=0;si<secs.length;si++){
    const sec=secs[si];
    checkPage(14);
    // Section header
    doc.setFillColor(254,249,195);
    doc.roundedRect(margin,y,colW,9,1,1,'F');
    doc.setDrawColor(229,224,160);doc.setLineWidth(0.3);
    doc.roundedRect(margin,y,colW,9,1,1,'D');
    // Badge
    doc.setFillColor(17,17,17);
    doc.roundedRect(margin+2,y+2,5,5,1,1,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.text(String(si+1),margin+4.5,y+5.8,{align:'center'});
    // Section title
    doc.setTextColor(17,17,17);doc.setFontSize(9.5);doc.setFont('helvetica','bold');
    doc.text(sec.title,margin+10,y+5.8);
    // Done count
    const secDone=sec.items.filter(i=>S.clDone[i.id]).length;
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,115,60);
    doc.text(secDone+'/'+sec.items.length,margin+colW-2,y+5.8,{align:'right'});
    y+=10;

    for(const item of sec.items){
      const ok=!!S.clDone[item.id];
      const photos=S.clPhotos[item.id]||[];
      const lines=doc.splitTextToSize(item.text,colW-14);
      const textH=lines.length*5;
      const photoH=photos.length?(29+6):0; // photo height + gap above
      const rowH=Math.max(10, 4+textH+photoH+4); // pad top+bottom
      checkPage(rowH);
      // Row bg
      doc.setFillColor(ok?240:254, ok?253:252, ok?244:232);
      doc.rect(margin,y,colW,rowH,'F');
      doc.setDrawColor(245,240,204);doc.setLineWidth(0.2);
      doc.line(margin,y+rowH,margin+colW,y+rowH);
      // Checkbox — draw manually as filled rect + checkmark lines
      const cbx=margin+2.5, cby=y+3, cbs=5.5;
      if(ok){
        doc.setFillColor(5,150,105);
        doc.roundedRect(cbx,cby,cbs,cbs,1,1,'F');
        // Draw checkmark as two lines
        doc.setDrawColor(255,255,255);doc.setLineWidth(0.8);
        doc.line(cbx+1.1,cby+2.8, cbx+2.2,cby+4.0);
        doc.line(cbx+2.2,cby+4.0, cbx+4.3,cby+1.4);
      } else {
        doc.setDrawColor(176,168,96);doc.setLineWidth(0.5);
        doc.roundedRect(cbx,cby,cbs,cbs,1,1,'D');
      }
      // Item text
      doc.setTextColor(ok?160:17,ok?160:17,ok?160:17);
      doc.setFontSize(9);doc.setFont('helvetica','normal');
      doc.text(lines,margin+11,y+6);
      // Photos
      if(photos.length){
        const py=y+4+textH+4; // gap below text
        let px=margin+11;
        for(const ph of photos.slice(0,4)){
          try{doc.addImage(ph,'JPEG',px,py,38,29);}catch(e){}
          px+=40;
          if(px>margin+colW-40)break;
        }
      }
      y+=rowH;
    }
    y+=4;
  }

  // ── CIERRE DE CAJA (solo cierre) ──
  if(S.caja&&(S.caja.efectivo!==''||S.caja.sobre!==''||S.caja.transferencias!=='')){
    const cj=S.caja;
    checkPage(48);
    y+=4;
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);
    doc.line(margin,y,margin+colW,y);
    y+=5;
    // Header
    doc.setFillColor(232,50,90);
    doc.roundedRect(margin,y,colW,8,1,1,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('CIERRE DE CAJA — TURNO '+(mode==='apertura'?'AM':'PM'),margin+4,y+5.5);
    y+=11;
    // Rows
    const rows2=[
      ['Efectivo en caja','$'+(+cj.efectivo||0).toLocaleString('es-CL')],
      ['Dinero en sobre','$'+(+cj.sobre||0).toLocaleString('es-CL')],
      ['Transferencias recibidas','$'+(+cj.transferencias||0).toLocaleString('es-CL')],
    ];
    rows2.forEach(([lbl,val],i)=>{
      doc.setFillColor(i%2===0?248:255,i%2===0?248:255,i%2===0?248:255);
      doc.rect(margin,y,colW,7,'F');
      doc.setTextColor(80,80,80);doc.setFontSize(9);doc.setFont('helvetica','normal');
      doc.text(lbl,margin+3,y+5);
      doc.setFont('helvetica','bold');doc.setTextColor(17,17,17);
      doc.text(val,margin+colW-3,y+5,{align:'right'});
      y+=7;
    });
    // Total
    const total=(+cj.efectivo||0)+(+cj.sobre||0)+(+cj.transferencias||0);
    doc.setFillColor(5,150,105);
    doc.rect(margin,y,colW,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('TOTAL TURNO',margin+3,y+5.5);
    doc.text('$'+total.toLocaleString('es-CL'),margin+colW-3,y+5.5,{align:'right'});
    y+=12;
  }

  // ── FIRMA ──
  if(S.sig){
    checkPage(32);
    y+=4;
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);
    doc.line(margin,y,margin+colW,y);
    y+=5;
    doc.setTextColor(120,120,120);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text('FIRMA DEL RESPONSABLE',margin,y);
    y+=4;
    try{doc.addImage(S.sig,'PNG',margin,y,44,18);}catch(e){}
    y+=22;
  }

  // ── FOOTER ──
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(180,180,180);
  doc.text('Caja SF · Street Flags · '+day+'/'+mon, pageW/2, pageH-5, {align:'center'});

  return doc;
}

async function doPDF(mode){
  if(!window.jspdf){toast('Cargando librería PDF…');return;}
  try{
    const doc = await buildPDF(mode||S.clMode||'apertura');
    const fname = 'checklist-'+(mode||S.clMode||'apertura')+'-'+new Date().toISOString().split('T')[0]+'.pdf';
    doc.save(fname);
  }catch(e){console.error(e);toast('Error generando PDF');}
}

// Import xlsx conteo
function importXLSX(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      let loaded=0;
      rows.slice(1).forEach(row=>{
        const nombre=row[0],stock=row[2];
        if(typeof nombre!=='string'||stock===undefined||stock==='')return;
        const p=PRODUCTS.find(x=>x.n.toLowerCase()===nombre.toLowerCase());
        if(p&&!isNaN(+stock)){S.counts[p.id]=+stock;loaded++;}
      });
      persist();toast(`${loaded} productos importados`);render();
    }catch(err){toast('Error al leer el archivo');}
  };
  reader.readAsArrayBuffer(file);
}
let sigDraw=false,sigCtx=null,sigLX=0,sigLY=0;
function initSig(){
  const c=document.getElementById('sigC');if(!c)return;
  sigCtx=c.getContext('2d');
  if(S.sig){const img=new Image();img.onload=()=>sigCtx.drawImage(img,0,0,c.width,c.height);img.src=S.sig;}
  function pos(e){const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,src=e.touches?e.touches[0]:e;return[(src.clientX-r.left)*sx,(src.clientY-r.top)*sy]}
  c.addEventListener('mousedown',e=>{sigDraw=true;[sigLX,sigLY]=pos(e)});
  c.addEventListener('mousemove',e=>{if(!sigDraw)return;const[x,y]=pos(e);sigCtx.beginPath();sigCtx.moveTo(sigLX,sigLY);sigCtx.lineTo(x,y);sigCtx.strokeStyle='#0d0d0d';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.stroke();[sigLX,sigLY]=[x,y];c.closest('.sig-box').classList.add('drawn')});
  c.addEventListener('mouseup',()=>sigDraw=false);
  c.addEventListener('touchstart',e=>{e.preventDefault();sigDraw=true;[sigLX,sigLY]=pos(e)},{passive:false});
  c.addEventListener('touchmove',e=>{if(!sigDraw)return;e.preventDefault();const[x,y]=pos(e);sigCtx.beginPath();sigCtx.moveTo(sigLX,sigLY);sigCtx.lineTo(x,y);sigCtx.strokeStyle='#0d0d0d';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.stroke();[sigLX,sigLY]=[x,y];c.closest('.sig-box').classList.add('drawn')},{passive:false});
  c.addEventListener('touchend',()=>sigDraw=false);
}

  const obNext=document.getElementById('obNext');
  if(obNext)obNext.addEventListener('click',()=>{
    const n=document.getElementById('obName');

    if(!S.clName)return;
    S.onboarded=true;persist();
    S.guideSeen.stock=true;persist();guideStep=0;render();
  });
  const obName=document.getElementById('obName');
  if(obName){
    obName.addEventListener('input',e=>{
      S.clName=e.target.value;persist();
      const btn=document.getElementById('obNext');
      if(btn){btn.disabled=!e.target.value.trim();btn.style.opacity=e.target.value.trim()?'1':'.4';}
    });
    obName.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&S.clName.trim()){

  if(gSkip)gSkip.addEventListener('click',()=>{guideStep=-1;render()});

  if(hBulb)hBulb.addEventListener('click',()=>{S.guideSeen={stock:false,check:false,exp:false};persist();guideStep=0;render()});
  const hMenu=document.getElementById('hMenu');

  // menu drawer
  const menuOverlay=document.getElementById('menuOverlay');
  if(menuOverlay)menuOverlay.addEventListener('click',e=>{if(e.target===menuOverlay){showMenu=false;showMenuNameEdit=false;render()}});
  const menuClose=document.getElementById('menuClose');
  if(menuClose)menuClose.addEventListener('click',()=>{showMenu=false;showMenuNameEdit=false;render()});
  const menuGuide=document.getElementById('menuGuide');
  if(menuGuide)menuGuide.addEventListener('click',()=>{S.guideSeen={stock:false,check:false,exp:false};persist();showMenu=false;showMenuNameEdit=false;guideStep=0;render()});
  const menuUser=document.getElementById('menuUser');
  if(menuUser)menuUser.addEventListener('click',()=>{showMenuNameEdit=!showMenuNameEdit;render();const inp=document.getElementById('menuNameInp');if(inp)inp.focus()});
  const menuNameSave=document.getElementById('menuNameSave');
  if(menuNameSave)menuNameSave.addEventListener('click',()=>{const inp=document.getElementById('menuNameInp');if(inp&&inp.value.trim()){S.clName=inp.value.trim();persist();showMenuNameEdit=false;render();toast('Nombre actualizado')}});
  const menuNameInp=document.getElementById('menuNameInp');
  if(menuNameInp)menuNameInp.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v){S.clName=v;persist();showMenuNameEdit=false;render();toast('Nombre actualizado')}}});
  const menuReset=document.getElementById('menuReset');
  if(menuReset)menuReset.addEventListener('click',()=>{if(confirm('¿Reiniciar todo el conteo?')){S.counts={};persist();showMenu=false;showMenuNameEdit=false;toast('Conteo reiniciado');render()}});

  // tabs
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{tab=el.dataset.tab;search='';render();maybeStartGuide()}));

  // search
  const si=document.getElementById('si');
  if(si){si.addEventListener('input',e=>{search=e.target.value;render();const n=document.getElementById('si');if(n){n.focus();const l=n.value.length;n.setSelectionRange(l,l)}});si.addEventListener('click',e=>e.stopPropagation())}

  // stock
  document.querySelectorAll('[data-col]').forEach(el=>el.addEventListener('click',()=>{S.collapsed[el.dataset.col]=!S.collapsed[el.dataset.col];render()}));
  document.querySelectorAll('[data-exp]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('[data-c],[data-dec],[data-inc],[data-f],[data-sv],[data-edit],[data-canceledit]'))return;const id=+el.dataset.exp;if(expanded!==id)editProd=null;expanded=expanded===id?null:id;render()}));
  document.querySelectorAll('[data-dec]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();updC(+b.dataset.dec,(S.counts[+b.dataset.dec]??0)-1)}));
  document.querySelectorAll('[data-inc]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();updC(+b.dataset.inc,(S.counts[+b.dataset.inc]??0)+1)}));
  document.querySelectorAll('[data-c]').forEach(inp=>{inp.addEventListener('change',e=>updC(+inp.dataset.c,parseInt(e.target.value)||0));inp.addEventListener('focus',e=>e.target.select());inp.addEventListener('click',e=>e.stopPropagation())});
  document.querySelectorAll('[data-f]').forEach(inp=>{inp.addEventListener('change',e=>{const pid=+inp.dataset.pid;if(inp.dataset.f==='prov')S.prov[pid]=e.target.value;else S.desc[pid]=e.target.value;persist()});inp.addEventListener('click',e=>e.stopPropagation())});
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();editProd=+b.dataset.edit;render()}));
  document.querySelectorAll('[data-canceledit]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();editProd=null;render()}));
  document.querySelectorAll('[data-sv]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const pid=+b.dataset.sv;sf[pid]=true;persist();render();setTimeout(()=>{delete sf[pid];render()},1400)}));

  // finish stock button → show modal
  const stFin=document.getElementById('stockFinish');
  if(stFin)stFin.addEventListener('click',()=>{showFinish=true;render()});
  // finish modal
  const finOverlay=document.getElementById('finOverlay');
  if(finOverlay)finOverlay.addEventListener('click',e=>{if(e.target===finOverlay){showFinish=false;render()}});
  const finClose=document.getElementById('finClose');
  if(finClose)finClose.addEventListener('click',()=>{showFinish=false;render()});
  const finWA=document.getElementById('finWA');
  if(finWA)finWA.addEventListener('click',()=>{showFinish=false;waStock()});
  const finSave=document.getElementById('finSave');
  if(finSave)finSave.addEventListener('click',()=>{showFinish=false;saveDay()});

  // checklist
  // cierre de caja inputs
  ['cajaEfectivoAp','cajaEfectivo','cajaSobre','cajaTrans'].forEach(eid=>{
    const el=document.getElementById(eid);
    if(!el)return;
    el.addEventListener('input',e=>{
      if(!S.caja)S.caja={efectivoAp:'',efectivo:'',sobre:'',transferencias:''};
      const mode=S.clMode||'apertura';
      if(eid==='cajaEfectivoAp') S.caja.efectivoAp=e.target.value;
      else if(eid==='cajaEfectivo') S.caja[mode==='apertura'?'efectivoAp':'efectivo']=e.target.value;
      else if(eid==='cajaSobre') S.caja.sobre=e.target.value;
      else if(eid==='cajaTrans') S.caja.transferencias=e.target.value;
      persist();
    });
  });

  // checklist screen navigation
  const clSelAmAp=document.getElementById('clSelAmAp');
  if(clSelAmAp)clSelAmAp.addEventListener('click',()=>{clNavDir='forward';S.clScreen='amAp';S.clMode='apertura';persist();render()});
  const clSelAmCi=document.getElementById('clSelAmCi');
  if(clSelAmCi)clSelAmCi.addEventListener('click',()=>{clNavDir='forward';S.clScreen='amCi';S.clMode='cierre';persist();render()});
  const clSelPmCi=document.getElementById('clSelPmCi');
  if(clSelPmCi)clSelPmCi.addEventListener('click',()=>{clNavDir='forward';S.clScreen='pmCi';S.clMode='cierre';persist();render()});
  const clSelectAp=document.getElementById('clSelectAp');
  if(clSelectAp)clSelectAp.addEventListener('click',()=>{S.clScreen='apertura';S.clMode='apertura';persist();render()});
  const clSelectCi=document.getElementById('clSelectCi');
  if(clSelectCi)clSelectCi.addEventListener('click',()=>{S.clScreen='cierre';S.clMode='cierre';persist();render()});
  const clBack=document.getElementById('clBack');
  if(clBack)clBack.addEventListener('click',()=>{clNavDir='back';S.clScreen='select';persist();render()});
  document.querySelectorAll('[data-mode]').forEach(el=>el.addEventListener('click',()=>{S.clMode=el.dataset.mode;persist();render()}));
  const cln=document.getElementById('clName');if(cln){cln.addEventListener('input',e=>{S.clName=e.target.value;persist()});}
  document.querySelectorAll('[data-cls]').forEach(el=>el.addEventListener('click',()=>{S.clCollapsed[el.dataset.cls]=!S.clCollapsed[el.dataset.cls];render()}));
  document.querySelectorAll('[data-clck]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();e.preventDefault();
      S.clDone[el.dataset.clck]=!S.clDone[el.dataset.clck];
      // don't call render() — just update the DOM directly for performance and stability
      const item=el.closest('.cl-item');
      if(item){
        const isDone=S.clDone[el.dataset.clck];
        item.classList.toggle('done',isDone);
        el.classList.toggle('on',isDone);
      }
      persist();
    },true); // capture phase so it fires before any parent handler
  });
  const clr=document.getElementById('clReset');if(clr)clr.addEventListener('click',()=>{S.clDone={};S.clPhotos={};S.sig=null;S.caja={efectivoAp:'',efectivo:'',sobre:'',transferencias:''};persist();render()});

  // photos
  document.querySelectorAll('[data-upl]').forEach(inp=>{
    // Remove any stale listeners by cloning
    const fresh=inp.cloneNode(true);
    inp.parentNode.replaceChild(fresh,inp);
    fresh.addEventListener('change',function(e){
      const file=e.target.files&&e.target.files[0];
      if(!file)return;
      const id=fresh.dataset.upl;
      // Save sig before render
      const cv=document.getElementById('sigC');
      if(cv){try{const c2=cv.getContext('2d');const px=c2.getImageData(0,0,cv.width,cv.height).data;if(px.some((v,i)=>i%4===3&&v>0))S.sig=cv.toDataURL();}catch(ex){}}
      const rd=new FileReader();
      rd.onload=function(ev){
        if(!ev.target.result)return;
        if(!S.clPhotos[id])S.clPhotos[id]=[];
        S.clPhotos[id].push(ev.target.result);
        persist();
        render();
        // Restore sig to new canvas
        if(S.sig){
          const cv2=document.getElementById('sigC');
          if(cv2){const c3=cv2.getContext('2d');const im=new Image();im.onload=()=>{c3.drawImage(im,0,0,cv2.width,cv2.height);const sb=cv2.closest('.sig-box');if(sb)sb.classList.add('drawn');};im.src=S.sig;}
        }
      };
      rd.onerror=()=>toast('Error al cargar la foto');
      rd.readAsDataURL(file);
    });
  });
  document.querySelectorAll('[data-dph]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const id=btn.dataset.dph,idx=+btn.dataset.idx;if(S.clPhotos[id]){S.clPhotos[id].splice(idx,1);if(!S.clPhotos[id].length)delete S.clPhotos[id]}persist();render()}));

  // signature
  initSig();
  const sc=document.getElementById('sigClr');
  if(sc)sc.addEventListener('click',()=>{
    const c=document.getElementById('sigC');
    if(c&&sigCtx){sigCtx.clearRect(0,0,c.width,c.height);c.closest('.sig-box').classList.remove('drawn');}
    S.sig=null;persist();
  });
  const fin=document.getElementById('clFinish');
  if(fin)fin.addEventListener('click',async()=>{
    const mode=S.clScreen==='amCi'?'cierre':S.clScreen==='pmCi'?'cierre':'apertura';
    const cj=S.caja||{};
    if(mode==='cierre'){
      if(cj.efectivoAp===''||cj.efectivo===''||cj.sobre===''||cj.transferencias===''){
        toast('Completa el cierre de caja primero');return;
      }
    }
    if(S.clScreen!=='amCi')toast('Generando PDF…');else toast('Enviando…');
    // Capture sig from current DOM canvas (sigCtx may be stale after render)
    const c=document.getElementById('sigC');
    if(c){
      try{
        const ctx=c.getContext('2d');
        if(ctx){const px=ctx.getImageData(0,0,c.width,c.height).data;if(px.some((v,i)=>i%4===3&&v>0)){S.sig=c.toDataURL();}}
      }catch(e){}
    }
    // If canvas empty but S.sig exists, keep it — don't overwrite with null
    // Save checklist to history
    const now2=new Date();
    const hEntry={
      date:now2.toISOString().split('T')[0],
      time:now2.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}),
      mode,
      name:S.clName||'',
      done:Object.keys(S.clDone).filter(k=>S.clDone[k]).length,
      total:(mode==='apertura'?CL_APERTURA:CL_CIERRE).flatMap(s=>s.items).length,
      caja:{...cj}
    };
    if(!S.clHistory)S.clHistory=[];
    S.clHistory.unshift(hEntry);
    if(S.clHistory.length>60)S.clHistory=S.clHistory.slice(0,60);
    // Mark turno as sent
    if(!S.sent)S.sent={amAp:false,amCi:false,pmCi:false};
    if(S.clScreen==='amAp')S.sent.amAp=true;
    else if(S.clScreen==='amCi')S.sent.amCi=true;
    else if(S.clScreen==='pmCi')S.sent.pmCi=true;
    persist();
    const d=now2.toLocaleDateString('es-CL',{day:'numeric',month:'long'});
    const t=now2.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
    const nombre=S.clName||'';

    if(S.clScreen==='amAp'){
      // WA first (needs user gesture context — no await before this)
      const waMsg=`*Checklist apertura${nombre?' — '+nombre:''}*\nEfectivo inicial: $${(+cj.efectivoAp||0).toLocaleString('es-CL')}`;
      openWA(waMsg);
      // PDF after WA (download, no share dialog needed)
      if(window.jspdf){
        try{
          const doc=await buildPDF('apertura');
          const fname='checklist-apertura-'+now2.toISOString().split('T')[0]+'.pdf';
          const pdfBlob=doc.output('blob');
          const file=new File([pdfBlob],fname,{type:'application/pdf'});
          if(navigator.canShare&&navigator.canShare({files:[file]})){
            try{await navigator.share({files:[file],title:'Checklist Apertura'});}
            catch(e){if(e.name!=='AbortError')doc.save(fname);}
          } else {doc.save(fname);}
        }catch(e){console.error(e);toast('Error PDF: '+e.message);}
      }

    } else if(S.clScreen==='amCi'){
      // AM Cierre: solo WA, sin PDF
      const waMsg=`*AM Cierre${nombre?' — '+nombre:''}*\nEfectivo al iniciar: $${(+cj.efectivoAp||0).toLocaleString('es-CL')}\nEfectivo en caja al cerrar: $${(+cj.efectivo||0).toLocaleString('es-CL')}\nDinero en sobre: $${(+cj.sobre||0).toLocaleString('es-CL')}\nTransferencias recibidas: $${(+cj.transferencias||0).toLocaleString('es-CL')}`;
      openWA(waMsg);

    } else {
      // PM Cierre: WA first (must be synchronous from user gesture), then PDF
      const waMsg=`*PM Cierre${nombre?' — '+nombre:''}*\nEfectivo al iniciar: $${(+cj.efectivoAp||0).toLocaleString('es-CL')}\nEfectivo en caja al cerrar: $${(+cj.efectivo||0).toLocaleString('es-CL')}\nDinero en sobre: $${(+cj.sobre||0).toLocaleString('es-CL')}\nTransferencias recibidas: $${(+cj.transferencias||0).toLocaleString('es-CL')}`;
      openWA(waMsg);
      if(window.jspdf){
        try{
          const doc=await buildPDF('cierre');
          const fname='checklist-cierre-'+now2.toISOString().split('T')[0]+'.pdf';
          const pdfBlob=doc.output('blob');
          const file=new File([pdfBlob],fname,{type:'application/pdf'});
          if(navigator.canShare&&navigator.canShare({files:[file]})){
            try{await navigator.share({files:[file],title:'Checklist PM Cierre'});}
            catch(e){if(e.name!=='AbortError')doc.save(fname);}
          } else {doc.save(fname);}
        }catch(e){console.error(e);toast('Error PDF: '+e.message);}
      }
    }
  });

  // tips dismiss
  const td=document.getElementById('tipsDismiss');if(td)td.addEventListener('click',()=>{S.hideTips=true;persist();render()});

  // import
  const imp=document.getElementById('importFile');
  if(imp)imp.addEventListener('change',e=>{const f=e.target.files[0];if(f)importXLSX(f)});

  // export
  const bSave=document.getElementById('bSave');if(bSave)bSave.addEventListener('click',saveDay);
  const bExcel=document.getElementById('bExcel');if(bExcel)bExcel.addEventListener('click',()=>doExcel());
  const bWA=document.getElementById('bWA');if(bWA)bWA.addEventListener('click',waStock);
  const bPDFap=document.getElementById('bPDFap');if(bPDFap)bPDFap.addEventListener('click',()=>doPDF('apertura'));
  const bPDFamci=document.getElementById('bPDFamci');if(bPDFamci)bPDFamci.addEventListener('click',()=>doPDF('cierre'));
  const bPDFci=document.getElementById('bPDFci');if(bPDFci)bPDFci.addEventListener('click',()=>doPDF('cierre'));

  // Slide animation
  if(tab==='check'&&S.clScreen!=='select'){
    const clPg2=document.getElementById('clPg');
    if(clPg2){
      const inner=clPg2.querySelector('div');
      if(inner){
        const cls=clNavDir==='back'?'cl-screen-back':'cl-screen-enter';
        inner.classList.remove('cl-screen-enter','cl-screen-back');
        requestAnimationFrame(()=>inner.classList.add(cls));
      }
    }
  }
}

// ── AUTO-GUIDE ────────────────────────────────────────────────
// Each tab shows its tips once, one at a time
// Stock: steps 0-2 (after 4s delay), Check: 3-4 (immediately), Exp: 5 (immediately)
const GUIDE_TAB = {stock:[0,1,2], check:[3,4], exp:[5]};
let stockDelayTimer = null;

// Ensure guideSeen exists on old state
if(!S.guideSeen)S.guideSeen={stock:false,check:false,exp:false};

function maybeStartGuide(){
  if(!S.onboarded||guideStep>=0)return;
  if(tab==='stock'&&!S.guideSeen.stock){
    if(stockDelayTimer)clearTimeout(stockDelayTimer);
    stockDelayTimer=setTimeout(()=>{
      if(!S.guideSeen.stock&&guideStep<0&&tab==='stock'){
        S.guideSeen.stock=true;persist();guideStep=0;render();
      }
    },4000);
  }
  if(tab==='check'&&!S.guideSeen.check){
    S.guideSeen.check=true;persist();
    setTimeout(()=>{if(guideStep<0){guideStep=3;render();}},500);
  }
  if(tab==='exp'&&!S.guideSeen.exp){
    S.guideSeen.exp=true;persist();
    setTimeout(()=>{if(guideStep<0){guideStep=5;render();}},300);
  }
}

// When guide advances, stop at end of current tab's steps
function guideNext(){
  const key=tab==='stock'?'stock':tab==='check'?'check':'exp';
  const steps=GUIDE_TAB[key]||[];
  const nextStep=guideStep+1;
  if(steps.includes(nextStep)){guideStep=nextStep;render();}
  else{guideStep=-1;render();}
}

render();
setTimeout(()=>{if(S.onboarded)maybeStartGuide();},400);
</script>
</body>
